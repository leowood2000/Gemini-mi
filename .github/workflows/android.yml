name: Android CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "platforms;android-34" "build-tools;34.0.0"
      - uses: gradle/actions/wrapper-validation@v4
      - run: chmod +x gradlew
      - run: ./gradlew testDebugUnitTest lintDebug assembleDebug

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "platforms;android-34" "build-tools;34.0.0"
      - uses: gradle/actions/wrapper-validation@v4
      - run: chmod +x gradlew
      - name: Restore signing keystore
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          test -n "$SIGNING_KEYSTORE_BASE64"
          echo "$SIGNING_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"
      - name: Build signed release APK
        env:
          SIGNING_STORE_FILE: ${{ runner.temp }}/release.keystore
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          test -n "$SIGNING_STORE_PASSWORD"
          test -n "$SIGNING_KEY_ALIAS"
          test -n "$SIGNING_KEY_PASSWORD"
          ./gradlew assembleRelease
      - name: Verify release APK
        run: |
          VERSION_NAME="$(sed -n 's/.*versionName "\([^"]*\)".*/\1/p' app/build.gradle)"
          test -n "$VERSION_NAME"
          APK_NAME="GeminiMi-${VERSION_NAME}.apk"
          APK_PATH="app/build/outputs/apk/release/${APK_NAME}"
          cp app/build/outputs/apk/release/app-release.apk "$APK_PATH"
          CERT_OUTPUT="$("$ANDROID_HOME/build-tools/34.0.0/apksigner" verify --verbose --print-certs "$APK_PATH")"
          echo "$CERT_OUTPUT"
          ! echo "$CERT_OUTPUT" | grep -qi "Android Debug"
          (cd "$(dirname "$APK_PATH")" && sha256sum "$APK_NAME" > "${APK_NAME}.sha256")
          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "APK_NAME=$APK_NAME" >> "$GITHUB_ENV"
          echo "APK_PATH=$APK_PATH" >> "$GITHUB_ENV"
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
            gh release create "${GITHUB_REF_NAME}" \
              --title "GeminiMi-${VERSION_NAME}" --generate-notes --verify-tag
          gh release upload "${GITHUB_REF_NAME}" \
            "${APK_PATH}" \
            "${APK_PATH}.sha256" \
            --clobber
